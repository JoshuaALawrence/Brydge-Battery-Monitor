name: "💡 Feature request"
description: Suggest an idea or improvement for Brydge Battery Monitor
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I have searched [existing issues](https://github.com/JoshuaALawrence/Brydge-Battery-Monitor/issues) and this has not already been requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: dropdown
    id: implementation
    attributes:
      label: Which implementation does this affect?
      options:
        - AutoHotkey (.ahk)
        - Python (.pyw)
        - Both
        - Not sure
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
